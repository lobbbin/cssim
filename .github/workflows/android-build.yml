name: Android Debug APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'
        cache-read-only: false

    - name: Generate Gradle Wrapper (if missing)
      run: |
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "Gradle wrapper JAR missing, generating..."
          gradle wrapper --gradle-version 8.2
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Universal Debug APK
      run: |
        echo "Building Android 14 Universal Debug APK..."
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: List APK files
      run: |
        echo "=== APK Files ==="
        find . -name "*.apk" -type f -exec ls -lh {} \;
        echo "================="

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: cssim-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 14
        if-no-files-found: error

    - name: Generate Build Summary
      if: always()
      run: |
        echo "## 📊 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Target:** Android 14 (API 34)" >> $GITHUB_STEP_SUMMARY
        echo "**Build Type:** Debug Universal APK" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          APK_SIZE=$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)
          echo "### 📦 APK Ready" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Download:** Check the artifacts section below" >> $GITHUB_STEP_SUMMARY
        fi
